# 新手模式配置

## 状态存储
```json
{
  "beginner_mode": {
    "enabled": false,
    "level": 1,
    "shown_skills": [],
    "hints_shown": 0,
    "enabled_at": null,
    "total_interactions": 0
  }
}
```

## 等级规则

| 等级 | 名称 | 解锁条件 | 推荐技能数 |
|------|------|----------|------------|
| 1 | 新手 | 默认 | 4 |
| 2 | 入门 | 展示 4 个技能 | 4 |
| 3 | 进阶 | 展示 8 个技能 | 4 |
| 4 | 熟练 | 展示 12 个技能 | 4 |
| 5 | 专家 | 展示 16 个技能 | 自动关闭 |

## 触发词

```yaml
enable_triggers:
  - "打开新手模式"
  - "开启新手模式"
  - "开启新手引导"
  - "我是新手"
  - "怎么用"
  - "怎么使用"
  - "你能做什么"
  - "你会什么"
  - "帮助"
  - "help"

disable_triggers:
  - "关闭新手模式"
  - "不需要引导"
  - "不用引导了"
  - "关闭引导"
```

## 推荐间隔

```yaml
recommendation_interval:
  min_interactions: 2  # 至少 2 次交互后才推荐下一个
  max_per_session: 5   # 每次会话最多推荐 5 个
  cooldown_seconds: 60 # 推荐冷却时间
```

## 消息模板

### 开启消息
```
🎓 新手模式已开启

我会帮你发现各种实用功能，每次回复后会推荐你可能感兴趣的技能。

当前等级：⭐ 新手
已解锁技能：0 个

💡 试试说："几点了" 或 "记一下买牛奶"
```

### 推荐消息
```
---
💡 技能推荐：{skill_name}
{skill_description}
📝 试试说："{example_command}"
```

### 升级消息
```
🎉 恭喜升级！新手等级：⭐⭐ 入门

已解锁新技能：
- {skill_1}
- {skill_2}

继续探索更多功能吧！
```

### 关闭消息
```
🎓 新手模式已关闭

你已经了解了基本功能，随时说"打开新手模式"可以重新开启。
```

### 专家毕业消息
```
🎉 恭喜达到专家等级！

你已经掌握了所有基础技能，新手模式自动关闭。

需要更多帮助时，随时问我！
```
