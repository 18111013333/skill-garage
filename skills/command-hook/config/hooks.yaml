# 命令钩子配置

# 全局配置
global:
  enabled: true
  log_level: info
  timeout_ms: 60000

# 预处理钩子
before:
  - name: validate_params
    enabled: true
    priority: 100
    config:
      strict_mode: false

  - name: log_command
    enabled: true
    priority: 90
    config:
      log_params: true
      log_user: true

  - name: check_permission
    enabled: true
    priority: 80
    config:
      admin_bypass: true

  - name: rate_limit
    enabled: true
    priority: 70
    config:
      max_requests: 100
      window_seconds: 60

# 后处理钩子
after:
  - name: log_result
    enabled: true
    priority: 100
    config:
      log_output: true
      max_output_length: 1000

  - name: update_metrics
    enabled: true
    priority: 90
    config:
      track_duration: true
      track_success_rate: true

  - name: cache_result
    enabled: false
    priority: 80
    config:
      ttl_seconds: 300
      max_size: 1000

# 错误钩子
error:
  - name: log_error
    enabled: true
    priority: 100
    config:
      include_stack: true
      notify_admin: true

  - name: retry_command
    enabled: true
    priority: 90
    config:
      max_retries: 3
      retry_delay_ms: 1000
      exponential_backoff: true

  - name: fallback
    enabled: false
    priority: 80
    config:
      fallback_command: "echo 'Command failed'"

# 命令类型特定配置
command_types:
  exec:
    before:
      - validate_params
      - log_command
      - check_permission
    after:
      - log_result
      - update_metrics
    error:
      - log_error

  read:
    before:
      - log_command
    after:
      - log_result
    error:
      - log_error

  write:
    before:
      - validate_params
      - log_command
      - check_permission
    after:
      - log_result
      - update_metrics
    error:
      - log_error
      - notify_admin: true

# 通知配置
notifications:
  slack:
    enabled: false
    webhook_url: "${SLACK_WEBHOOK_URL}"
    channel: "#alerts"

  email:
    enabled: false
    smtp_host: "${SMTP_HOST}"
    smtp_port: 587
    from: "noreply@example.com"
    to: "admin@example.com"

# 审计配置
audit:
  enabled: true
  storage: "file"
  path: "/var/log/openclaw/audit.log"
  retention_days: 30
  format: "json"
